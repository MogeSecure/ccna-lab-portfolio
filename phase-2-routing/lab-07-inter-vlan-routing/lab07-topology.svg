<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="520" fill="#0f172a"/>
  <text x="450" y="30" fill="#f1f5f9" font-size="16" font-weight="bold" text-anchor="middle">SomNet Solutions — Inter-VLAN Routing (Lab 07)</text>

  <!-- Router -->
  <rect x="370" y="60" width="160" height="70" rx="8" fill="#1e293b" stroke="#facc15" stroke-width="2.5"/>
  <text x="450" y="88" fill="#e2e8f0" font-size="15" font-weight="bold" text-anchor="middle">HQ-R1</text>
  <text x="450" y="106" fill="#94a3b8" font-size="10" text-anchor="middle">Fa0/0.10 → 192.168.10.1</text>
  <text x="450" y="120" fill="#94a3b8" font-size="10" text-anchor="middle">Fa0/0.20 → 192.168.20.1</text>

  <!-- SW1 -->
  <rect x="150" y="180" width="200" height="70" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2.5"/>
  <text x="250" y="208" fill="#e2e8f0" font-size="15" font-weight="bold" text-anchor="middle">HQ-SW1</text>
  <text x="250" y="226" fill="#a78bfa" font-size="10" text-anchor="middle">ROOT BRIDGE</text>
  <text x="250" y="240" fill="#94a3b8" font-size="10" text-anchor="middle">Fa0/5 → trunk to router</text>

  <!-- SW2 -->
  <rect x="550" y="180" width="200" height="70" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2.5"/>
  <text x="650" y="208" fill="#e2e8f0" font-size="15" font-weight="bold" text-anchor="middle">HQ-SW2</text>

  <!-- router to sw1 trunk -->
  <line x1="410" y1="130" x2="280" y2="180" stroke="#facc15" stroke-width="3"/>
  <text x="330" y="150" fill="#facc15" font-size="10" text-anchor="middle">802.1Q trunk</text>

  <!-- sw1 to sw2 etherchannel -->
  <line x1="350" y1="205" x2="550" y2="205" stroke="#22c55e" stroke-width="4"/>
  <text x="450" y="195" fill="#22c55e" font-size="10" text-anchor="middle">Port-channel 1</text>

  <!-- PCs -->
  <g>
    <rect x="80" y="330" width="80" height="55" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="120" y="362" fill="#e2e8f0" font-size="11" text-anchor="middle">PC1 HR</text>
    <text x="120" y="376" fill="#94a3b8" font-size="9" text-anchor="middle">gw: .1</text>
  </g>
  <g>
    <rect x="180" y="330" width="80" height="55" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="220" y="362" fill="#e2e8f0" font-size="11" text-anchor="middle">PC2 HR</text>
    <text x="220" y="376" fill="#94a3b8" font-size="9" text-anchor="middle">gw: .1</text>
  </g>
  <g>
    <rect x="280" y="330" width="80" height="55" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <text x="320" y="362" fill="#e2e8f0" font-size="11" text-anchor="middle">PC3 Sales</text>
    <text x="320" y="376" fill="#94a3b8" font-size="9" text-anchor="middle">gw: .1</text>
  </g>
  <g>
    <rect x="580" y="330" width="80" height="55" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="620" y="362" fill="#e2e8f0" font-size="11" text-anchor="middle">PC5 HR</text>
    <text x="620" y="376" fill="#94a3b8" font-size="9" text-anchor="middle">gw: .1</text>
  </g>
  <g>
    <rect x="680" y="330" width="80" height="55" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <text x="720" y="362" fill="#e2e8f0" font-size="11" text-anchor="middle">PC6 Sales</text>
    <text x="720" y="376" fill="#94a3b8" font-size="9" text-anchor="middle">gw: .1</text>
  </g>

  <line x1="120" y1="330" x2="200" y2="250" stroke="#64748b" stroke-width="1.5"/>
  <line x1="220" y1="330" x2="220" y2="250" stroke="#64748b" stroke-width="1.5"/>
  <line x1="320" y1="330" x2="250" y2="250" stroke="#64748b" stroke-width="1.5"/>
  <line x1="620" y1="330" x2="600" y2="250" stroke="#64748b" stroke-width="1.5"/>
  <line x1="720" y1="330" x2="660" y2="250" stroke="#64748b" stroke-width="1.5"/>

  <text x="450" y="440" fill="#64748b" font-size="12" text-anchor="middle">Router-on-a-stick: ONE physical link, TWO logical subinterfaces (one per VLAN)</text>
  <text x="450" y="460" fill="#64748b" font-size="12" text-anchor="middle">PC1 (HR) can now reach PC3 (Sales) — traffic passes through HQ-R1</text>
  <text x="450" y="480" fill="#64748b" font-size="12" text-anchor="middle">Management VLAN 99 is NOT routed — stays isolated on purpose</text>
</svg>
