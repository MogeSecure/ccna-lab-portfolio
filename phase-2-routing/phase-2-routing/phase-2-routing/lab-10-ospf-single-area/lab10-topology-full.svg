<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="680" viewBox="0 0 1050 680" font-family="Helvetica, Arial, sans-serif">
  <rect width="1050" height="680" fill="#0f172a"/>
  <text x="525" y="28" fill="#f1f5f9" font-size="16" font-weight="bold" text-anchor="middle">SomNet Solutions — Lab 10 FULL Topology (OSPF Area 0)</text>

  <rect x="405" y="45" width="240" height="30" rx="15" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="525" y="65" fill="#a78bfa" font-size="13" font-weight="bold" text-anchor="middle">OSPF AREA 0</text>

  <text x="240" y="95" fill="#64748b" font-size="12" text-anchor="middle">HQ OFFICE</text>
  <text x="810" y="95" fill="#64748b" font-size="12" text-anchor="middle">BRANCH OFFICE</text>

  <!-- HQ-R1 -->
  <rect x="150" y="105" width="180" height="90" rx="8" fill="#1e293b" stroke="#facc15" stroke-width="2.5"/>
  <text x="240" y="128" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">HQ-R1</text>
  <text x="240" y="144" fill="#94a3b8" font-size="9" text-anchor="middle">router-id 1.1.1.1</text>
  <text x="240" y="157" fill="#94a3b8" font-size="9" text-anchor="middle">Gi0/0.10: 192.168.10.1</text>
  <text x="240" y="169" fill="#94a3b8" font-size="9" text-anchor="middle">Gi0/0.20: 192.168.20.1</text>
  <text x="240" y="181" fill="#94a3b8" font-size="9" text-anchor="middle">passive: Gi0/0.10, Gi0/0.20</text>

  <!-- BRANCH-R1 -->
  <rect x="700" y="105" width="180" height="90" rx="8" fill="#1e293b" stroke="#facc15" stroke-width="2.5"/>
  <text x="790" y="128" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">BRANCH-R1</text>
  <text x="790" y="144" fill="#94a3b8" font-size="9" text-anchor="middle">router-id 2.2.2.2</text>
  <text x="790" y="157" fill="#94a3b8" font-size="9" text-anchor="middle">Gi0/0: 192.168.30.1</text>
  <text x="790" y="169" fill="#94a3b8" font-size="9" text-anchor="middle">passive: Gi0/0</text>
  <text x="790" y="181" fill="#94a3b8" font-size="9" text-anchor="middle">OSPF active: Gi0/1, Gi0/2</text>

  <!-- primary link -->
  <line x1="330" y1="135" x2="700" y2="135" stroke="#22c55e" stroke-width="3.5"/>
  <text x="515" y="125" fill="#22c55e" font-size="10.5" font-weight="bold" text-anchor="middle">Gi0/1 — 192.168.100.0/30 — cost 1 (PRIMARY)</text>

  <!-- backup link -->
  <line x1="330" y1="165" x2="700" y2="165" stroke="#f87171" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="515" y="187" fill="#f87171" font-size="10.5" font-weight="bold" text-anchor="middle">Gi0/2 — 192.168.101.0/30 — cost 50 (BACKUP)</text>

  <!-- HQ-SW1 -->
  <rect x="70" y="240" width="160" height="80" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-width="2.5"/>
  <text x="150" y="263" fill="#e2e8f0" font-size="13" font-weight="bold" text-anchor="middle">HQ-SW1</text>
  <text x="150" y="278" fill="#a78bfa" font-size="9" text-anchor="middle">ROOT BRIDGE</text>
  <text x="150" y="291" fill="#94a3b8" font-size="9" text-anchor="middle">Fa0/5 → trunk to R1</text>
  <text x="150" y="304" fill="#94a3b8" font-size="9" text-anchor="middle">Vlan99: 192.168.99.1</text>
  <line x1="240" y1="195" x2="180" y2="240" stroke="#facc15" stroke-width="2"/>

  <!-- HQ-SW2 -->
  <rect x="260" y="240" width="160" height="80" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-width="2.5"/>
  <text x="340" y="263" fill="#e2e8f0" font-size="13" font-weight="bold" text-anchor="middle">HQ-SW2</text>
  <text x="340" y="278" fill="#94a3b8" font-size="9" text-anchor="middle">Vlan99: 192.168.99.2</text>

  <line x1="230" y1="270" x2="260" y2="270" stroke="#22c55e" stroke-width="4"/>
  <text x="245" y="335" fill="#22c55e" font-size="8" text-anchor="middle">Po1</text>

  <!-- BRANCH-SW1 -->
  <rect x="720" y="240" width="160" height="70" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-width="2.5"/>
  <text x="800" y="263" fill="#e2e8f0" font-size="13" font-weight="bold" text-anchor="middle">BRANCH-SW1</text>
  <text x="800" y="278" fill="#94a3b8" font-size="9" text-anchor="middle">Vlan30, Vlan99</text>
  <text x="800" y="291" fill="#94a3b8" font-size="9" text-anchor="middle">Vlan99: 192.168.199.1</text>
  <line x1="790" y1="195" x2="800" y2="240" stroke="#facc15" stroke-width="2"/>

  <!-- HQ PCs -->
  <g>
    <rect x="20" y="400" width="75" height="55" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="57" y="425" fill="#e2e8f0" font-size="10.5" text-anchor="middle">PC1</text>
    <text x="57" y="440" fill="#94a3b8" font-size="8.5" text-anchor="middle">10.2 /29</text>
  </g>
  <g>
    <rect x="105" y="400" width="75" height="55" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="142" y="425" fill="#e2e8f0" font-size="10.5" text-anchor="middle">PC2</text>
    <text x="142" y="440" fill="#94a3b8" font-size="8.5" text-anchor="middle">10.3 /29</text>
  </g>
  <g>
    <rect x="190" y="400" width="75" height="55" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <text x="227" y="425" fill="#e2e8f0" font-size="10.5" text-anchor="middle">PC3</text>
    <text x="227" y="440" fill="#94a3b8" font-size="8.5" text-anchor="middle">20.2 /28</text>
  </g>
  <line x1="57" y1="400" x2="120" y2="320" stroke="#64748b" stroke-width="1.5"/>
  <line x1="142" y1="400" x2="145" y2="320" stroke="#64748b" stroke-width="1.5"/>
  <line x1="227" y1="400" x2="170" y2="320" stroke="#64748b" stroke-width="1.5"/>

  <g>
    <rect x="290" y="400" width="75" height="55" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="327" y="425" fill="#e2e8f0" font-size="10.5" text-anchor="middle">PC5</text>
    <text x="327" y="440" fill="#94a3b8" font-size="8.5" text-anchor="middle">10.4 /29</text>
  </g>
  <g>
    <rect x="375" y="400" width="75" height="55" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <text x="412" y="425" fill="#e2e8f0" font-size="10.5" text-anchor="middle">PC6</text>
    <text x="412" y="440" fill="#94a3b8" font-size="8.5" text-anchor="middle">20.3 /28</text>
  </g>
  <line x1="327" y1="400" x2="330" y2="320" stroke="#64748b" stroke-width="1.5"/>
  <line x1="412" y1="400" x2="405" y2="320" stroke="#64748b" stroke-width="1.5"/>

  <!-- Branch PCs -->
  <g>
    <rect x="740" y="400" width="75" height="55" rx="6" fill="#1e293b" stroke="#a3e635" stroke-width="2"/>
    <text x="777" y="425" fill="#e2e8f0" font-size="10.5" text-anchor="middle">PC7</text>
    <text x="777" y="440" fill="#94a3b8" font-size="8.5" text-anchor="middle">30.2 /29</text>
  </g>
  <g>
    <rect x="825" y="400" width="75" height="55" rx="6" fill="#1e293b" stroke="#a3e635" stroke-width="2"/>
    <text x="862" y="425" fill="#e2e8f0" font-size="10.5" text-anchor="middle">PC8</text>
    <text x="862" y="440" fill="#94a3b8" font-size="8.5" text-anchor="middle">30.3 /29</text>
  </g>
  <line x1="777" y1="400" x2="790" y2="310" stroke="#64748b" stroke-width="1.5"/>
  <line x1="862" y1="400" x2="820" y2="310" stroke="#64748b" stroke-width="1.5"/>

  <!-- legend -->
  <rect x="20" y="500" width="1010" height="160" rx="10" fill="#16283f" stroke="#334155" stroke-width="1"/>
  <text x="525" y="530" fill="#e2e8f0" font-size="13" font-weight="bold" text-anchor="middle">All 7 devices + all 7 PCs shown — nothing simplified</text>
  <text x="525" y="555" fill="#94a3b8" font-size="11.5" text-anchor="middle">OSPF neighbor relationship forms over BOTH Gi0/1 and Gi0/2 — cost decides which one carries traffic</text>
  <text x="525" y="578" fill="#94a3b8" font-size="11.5" text-anchor="middle">passive-interface default applied on both routers — only Gi0/1 and Gi0/2 actively speak OSPF hellos</text>
  <text x="525" y="601" fill="#94a3b8" font-size="11.5" text-anchor="middle">Floating static route (AD 115) still configured on both routers — true last-resort if OSPF process itself fails</text>
  <text x="525" y="624" fill="#94a3b8" font-size="11.5" text-anchor="middle">Management VLANs (HQ: 192.168.99.0/30, Branch: 192.168.199.0/30) remain unrouted — same security boundary as Lab 07</text>
  <text x="525" y="647" fill="#94a3b8" font-size="11.5" text-anchor="middle">EtherChannel (Po1) between HQ-SW1 and HQ-SW2 unchanged from Lab 06</text>
</svg>
