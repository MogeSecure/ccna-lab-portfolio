<svg xmlns="http://www.w3.org/2000/svg" width="860" height="460" viewBox="0 0 860 460" font-family="Helvetica, Arial, sans-serif">
  <rect width="860" height="460" fill="#0f172a"/>
  <text x="430" y="30" fill="#f1f5f9" font-size="16" font-weight="bold" text-anchor="middle">SomNet Solutions — Trunking Between Switches (Lab 03)</text>

  <!-- Floor labels -->
  <text x="230" y="60" fill="#64748b" font-size="12" text-anchor="middle">Floor 1</text>
  <text x="630" y="60" fill="#64748b" font-size="12" text-anchor="middle">Floor 2</text>

  <!-- SW1 -->
  <rect x="140" y="80" width="180" height="80" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2.5"/>
  <text x="230" y="112" fill="#e2e8f0" font-size="16" font-weight="bold" text-anchor="middle">HQ-SW1</text>
  <text x="230" y="132" fill="#94a3b8" font-size="11" text-anchor="middle">VLAN 99: 192.168.99.1</text>
  <text x="230" y="148" fill="#64748b" font-size="10" text-anchor="middle">Gi0/1</text>

  <!-- SW2 -->
  <rect x="540" y="80" width="180" height="80" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2.5"/>
  <text x="630" y="112" fill="#e2e8f0" font-size="16" font-weight="bold" text-anchor="middle">HQ-SW2</text>
  <text x="630" y="132" fill="#94a3b8" font-size="11" text-anchor="middle">VLAN 99: 192.168.99.2</text>
  <text x="630" y="148" fill="#64748b" font-size="10" text-anchor="middle">Gi0/1</text>

  <!-- Trunk link -->
  <line x1="320" y1="120" x2="540" y2="120" stroke="#a78bfa" stroke-width="4"/>
  <text x="430" y="105" fill="#a78bfa" font-size="13" font-weight="bold" text-anchor="middle">802.1Q TRUNK</text>
  <text x="430" y="145" fill="#94a3b8" font-size="11" text-anchor="middle">Allowed VLANs: 10, 20, 99</text>
  <text x="430" y="160" fill="#94a3b8" font-size="11" text-anchor="middle">Native VLAN: 99</text>

  <!-- HR PCs floor 1 -->
  <g>
    <rect x="70" y="250" width="80" height="55" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="110" y="282" fill="#e2e8f0" font-size="12" text-anchor="middle">PC1 HR</text>
  </g>
  <g>
    <rect x="170" y="250" width="80" height="55" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="210" y="282" fill="#e2e8f0" font-size="12" text-anchor="middle">PC2 HR</text>
  </g>
  <!-- Sales PCs floor 1 -->
  <g>
    <rect x="270" y="250" width="80" height="55" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <text x="310" y="282" fill="#e2e8f0" font-size="12" text-anchor="middle">PC3 Sales</text>
  </g>

  <!-- HR PC floor 2 -->
  <g>
    <rect x="540" y="250" width="80" height="55" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="580" y="282" fill="#e2e8f0" font-size="12" text-anchor="middle">PC5 HR</text>
  </g>
  <!-- Sales PC floor 2 -->
  <g>
    <rect x="640" y="250" width="80" height="55" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <text x="680" y="282" fill="#e2e8f0" font-size="12" text-anchor="middle">PC6 Sales</text>
  </g>

  <line x1="110" y1="250" x2="200" y2="160" stroke="#64748b" stroke-width="1.5"/>
  <line x1="210" y1="250" x2="220" y2="160" stroke="#64748b" stroke-width="1.5"/>
  <line x1="310" y1="250" x2="260" y2="160" stroke="#64748b" stroke-width="1.5"/>
  <line x1="580" y1="250" x2="600" y2="160" stroke="#64748b" stroke-width="1.5"/>
  <line x1="680" y1="250" x2="660" y2="160" stroke="#64748b" stroke-width="1.5"/>

  <text x="430" y="390" fill="#64748b" font-size="12" text-anchor="middle">PC1/PC2 (Floor 1, HR) and PC5 (Floor 2, HR) are in the same VLAN — they can reach each other across the trunk</text>
  <text x="430" y="410" fill="#64748b" font-size="12" text-anchor="middle">PC3 (Sales) still cannot reach PC1/PC2/PC5 (HR) — different VLANs, no router yet</text>
</svg>
