<svg xmlns="http://www.w3.org/2000/svg" width="820" height="440" viewBox="0 0 820 440" font-family="Helvetica, Arial, sans-serif">
  <rect width="820" height="440" fill="#0f172a"/>

  <!-- Switch -->
  <rect x="310" y="60" width="200" height="80" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2.5"/>
  <text x="410" y="95" fill="#e2e8f0" font-size="18" font-weight="bold" text-anchor="middle">HQ-SW1</text>
  <text x="410" y="118" fill="#94a3b8" font-size="13" text-anchor="middle">Cisco 2960</text>
  <text x="410" y="132" fill="#38bdf8" font-size="12" text-anchor="middle">192.168.10.1 /29</text>

  <!-- Port labels on switch bottom -->
  <text x="345" y="152" fill="#64748b" font-size="11" text-anchor="middle">Fa0/1</text>
  <text x="395" y="152" fill="#64748b" font-size="11" text-anchor="middle">Fa0/2</text>
  <text x="425" y="152" fill="#64748b" font-size="11" text-anchor="middle">Fa0/3</text>
  <text x="475" y="152" fill="#64748b" font-size="11" text-anchor="middle">Fa0/4</text>

  <!-- Connection lines -->
  <line x1="345" y1="140" x2="150" y2="260" stroke="#22c55e" stroke-width="2.5"/>
  <line x1="395" y1="140" x2="290" y2="260" stroke="#22c55e" stroke-width="2.5"/>
  <line x1="425" y1="140" x2="530" y2="260" stroke="#22c55e" stroke-width="2.5"/>
  <line x1="475" y1="140" x2="670" y2="260" stroke="#22c55e" stroke-width="2.5"/>

  <!-- cable label -->
  <text x="410" y="205" fill="#22c55e" font-size="12" text-anchor="middle" font-style="italic">copper straight-through ×4</text>

  <!-- PCs -->
  <g id="pc1">
    <rect x="105" y="260" width="90" height="65" rx="6" fill="#1e293b" stroke="#facc15" stroke-width="2"/>
    <rect x="120" y="272" width="60" height="35" rx="2" fill="#0f172a" stroke="#facc15"/>
    <text x="150" y="342" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">PC1</text>
    <text x="150" y="359" fill="#94a3b8" font-size="11" text-anchor="middle">.2 /29</text>
  </g>

  <g id="pc2">
    <rect x="245" y="260" width="90" height="65" rx="6" fill="#1e293b" stroke="#facc15" stroke-width="2"/>
    <rect x="260" y="272" width="60" height="35" rx="2" fill="#0f172a" stroke="#facc15"/>
    <text x="290" y="342" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">PC2</text>
    <text x="290" y="359" fill="#94a3b8" font-size="11" text-anchor="middle">.3 /29</text>
  </g>

  <g id="pc3">
    <rect x="485" y="260" width="90" height="65" rx="6" fill="#1e293b" stroke="#facc15" stroke-width="2"/>
    <rect x="500" y="272" width="60" height="35" rx="2" fill="#0f172a" stroke="#facc15"/>
    <text x="530" y="342" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">PC3</text>
    <text x="530" y="359" fill="#94a3b8" font-size="11" text-anchor="middle">.4 /29</text>
  </g>

  <g id="pc4">
    <rect x="625" y="260" width="90" height="65" rx="6" fill="#1e293b" stroke="#facc15" stroke-width="2"/>
    <rect x="640" y="272" width="60" height="35" rx="2" fill="#0f172a" stroke="#facc15"/>
    <text x="670" y="342" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">PC4</text>
    <text x="670" y="359" fill="#94a3b8" font-size="11" text-anchor="middle">.5 /29</text>
  </g>

  <!-- title -->
  <text x="410" y="30" fill="#f1f5f9" font-size="16" font-weight="bold" text-anchor="middle">SomNet Solutions — Branch Office (Lab 01)</text>

  <!-- legend -->
  <text x="410" y="410" fill="#64748b" font-size="12" text-anchor="middle">Network: 192.168.10.0/29 &#160;&#160;|&#160;&#160; Mask: 255.255.255.248</text>
</svg>
