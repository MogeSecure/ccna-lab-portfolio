<svg xmlns="http://www.w3.org/2000/svg" width="860" height="500" viewBox="0 0 860 500" font-family="Helvetica, Arial, sans-serif">
  <rect width="860" height="500" fill="#0f172a"/>

  <text x="430" y="30" fill="#f1f5f9" font-size="16" font-weight="bold" text-anchor="middle">SomNet Solutions — Redundant Link with STP (Lab 04)</text>

  <!-- SW1 -->
  <rect x="120" y="90" width="190" height="80" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2.5"/>
  <text x="215" y="120" fill="#e2e8f0" font-size="16" font-weight="bold" text-anchor="middle">HQ-SW1</text>
  <text x="215" y="140" fill="#a78bfa" font-size="11" text-anchor="middle">ROOT BRIDGE</text>
  <text x="215" y="156" fill="#94a3b8" font-size="11" text-anchor="middle">priority 4096</text>

  <!-- SW2 -->
  <rect x="550" y="90" width="190" height="80" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2.5"/>
  <text x="645" y="120" fill="#e2e8f0" font-size="16" font-weight="bold" text-anchor="middle">HQ-SW2</text>
  <text x="645" y="140" fill="#94a3b8" font-size="11" text-anchor="middle">non-root</text>
  <text x="645" y="156" fill="#94a3b8" font-size="11" text-anchor="middle">default priority</text>

  <!-- link 1 forwarding -->
  <line x1="310" y1="115" x2="550" y2="115" stroke="#22c55e" stroke-width="3"/>
  <text x="430" y="105" fill="#22c55e" font-size="12" text-anchor="middle" font-weight="bold">Gi0/1 — FORWARDING</text>

  <!-- link 2 blocked -->
  <line x1="310" y1="150" x2="550" y2="150" stroke="#ef4444" stroke-width="3" stroke-dasharray="6,4"/>
  <text x="430" y="178" fill="#ef4444" font-size="12" text-anchor="middle" font-weight="bold">Gi0/2 — BLOCKING (standby)</text>

  <!-- PCs SW1 -->
  <g>
    <rect x="60" y="260" width="70" height="50" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="95" y="325" fill="#e2e8f0" font-size="11" text-anchor="middle">PC1 HR</text>
  </g>
  <g>
    <rect x="150" y="260" width="70" height="50" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="185" y="325" fill="#e2e8f0" font-size="11" text-anchor="middle">PC2 HR</text>
  </g>
  <g>
    <rect x="240" y="260" width="70" height="50" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <text x="275" y="325" fill="#e2e8f0" font-size="11" text-anchor="middle">PC3 Sales</text>
  </g>

  <line x1="95" y1="260" x2="180" y2="170" stroke="#64748b" stroke-width="1.5"/>
  <line x1="185" y1="260" x2="205" y2="170" stroke="#64748b" stroke-width="1.5"/>
  <line x1="275" y1="260" x2="230" y2="170" stroke="#64748b" stroke-width="1.5"/>

  <!-- PCs SW2 -->
  <g>
    <rect x="600" y="260" width="70" height="50" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="635" y="325" fill="#e2e8f0" font-size="11" text-anchor="middle">PC5 HR</text>
  </g>
  <g>
    <rect x="690" y="260" width="70" height="50" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <text x="725" y="325" fill="#e2e8f0" font-size="11" text-anchor="middle">PC6 Sales</text>
  </g>

  <line x1="635" y1="260" x2="630" y2="170" stroke="#64748b" stroke-width="1.5"/>
  <line x1="725" y1="260" x2="660" y2="170" stroke="#64748b" stroke-width="1.5"/>

  <text x="430" y="400" fill="#64748b" font-size="12" text-anchor="middle">Two physical links between SW1 and SW2 = a loop.</text>
  <text x="430" y="420" fill="#64748b" font-size="12" text-anchor="middle">STP elects SW1 as root, keeps Gi0/1 forwarding, puts Gi0/2 in blocking state.</text>
  <text x="430" y="440" fill="#64748b" font-size="12" text-anchor="middle">If Gi0/1 fails, STP automatically unblocks Gi0/2 — that's the redundancy payoff.</text>
</svg>
