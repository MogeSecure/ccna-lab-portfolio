<svg xmlns="http://www.w3.org/2000/svg" width="860" height="480" viewBox="0 0 860 480" font-family="Helvetica, Arial, sans-serif">
  <rect width="860" height="480" fill="#0f172a"/>

  <text x="430" y="30" fill="#f1f5f9" font-size="16" font-weight="bold" text-anchor="middle">SomNet Solutions — Branch Office (Lab 02: VLAN Segmentation)</text>

  <!-- Switch -->
  <rect x="330" y="55" width="200" height="90" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2.5"/>
  <text x="430" y="85" fill="#e2e8f0" font-size="18" font-weight="bold" text-anchor="middle">HQ-SW1</text>
  <text x="430" y="106" fill="#94a3b8" font-size="12" text-anchor="middle">Cisco 2960</text>
  <text x="430" y="123" fill="#a78bfa" font-size="12" text-anchor="middle">VLAN 99 (mgmt): 192.168.99.1/30</text>
  <text x="430" y="138" fill="#64748b" font-size="10" text-anchor="middle">VLAN 1: unused / native</text>

  <!-- port labels -->
  <text x="360" y="158" fill="#f59e0b" font-size="10" text-anchor="middle">Fa0/1</text>
  <text x="400" y="158" fill="#f59e0b" font-size="10" text-anchor="middle">Fa0/2</text>
  <text x="460" y="158" fill="#22d3ee" font-size="10" text-anchor="middle">Fa0/3</text>
  <text x="500" y="158" fill="#22d3ee" font-size="10" text-anchor="middle">Fa0/4</text>

  <!-- lines HR (orange) -->
  <line x1="360" y1="145" x2="200" y2="290" stroke="#f59e0b" stroke-width="2.5"/>
  <line x1="400" y1="145" x2="330" y2="290" stroke="#f59e0b" stroke-width="2.5"/>

  <!-- lines Sales (cyan) -->
  <line x1="460" y1="145" x2="530" y2="290" stroke="#22d3ee" stroke-width="2.5"/>
  <line x1="500" y1="145" x2="660" y2="290" stroke="#22d3ee" stroke-width="2.5"/>

  <!-- HR box -->
  <rect x="150" y="200" width="260" height="45" rx="6" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="280" y="192" fill="#f59e0b" font-size="13" font-weight="bold" text-anchor="middle">VLAN 10 — HR — 192.168.10.0/29</text>

  <!-- Sales box -->
  <rect x="480" y="200" width="260" height="45" rx="6" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="610" y="192" fill="#22d3ee" font-size="13" font-weight="bold" text-anchor="middle">VLAN 20 — Sales — 192.168.20.0/28</text>

  <!-- PCs HR -->
  <g>
    <rect x="165" y="290" width="80" height="60" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="205" y="365" fill="#e2e8f0" font-size="13" font-weight="bold" text-anchor="middle">PC1 (HR)</text>
    <text x="205" y="381" fill="#94a3b8" font-size="11" text-anchor="middle">.2 /29</text>
  </g>
  <g>
    <rect x="295" y="290" width="80" height="60" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="335" y="365" fill="#e2e8f0" font-size="13" font-weight="bold" text-anchor="middle">PC2 (HR)</text>
    <text x="335" y="381" fill="#94a3b8" font-size="11" text-anchor="middle">.3 /29</text>
  </g>

  <!-- PCs Sales -->
  <g>
    <rect x="495" y="290" width="80" height="60" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <text x="535" y="365" fill="#e2e8f0" font-size="13" font-weight="bold" text-anchor="middle">PC3 (Sales)</text>
    <text x="535" y="381" fill="#94a3b8" font-size="11" text-anchor="middle">.2 /28</text>
  </g>
  <g>
    <rect x="625" y="290" width="80" height="60" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <text x="665" y="365" fill="#e2e8f0" font-size="13" font-weight="bold" text-anchor="middle">PC4 (Sales)</text>
    <text x="665" y="381" fill="#94a3b8" font-size="11" text-anchor="middle">.3 /28</text>
  </g>

  <!-- legend -->
  <text x="430" y="430" fill="#64748b" font-size="12" text-anchor="middle">HR and Sales cannot reach each other yet — separate broadcast domains, no router configured</text>
  <text x="430" y="450" fill="#64748b" font-size="12" text-anchor="middle">Management now isolated on VLAN 99 (not VLAN 1)</text>
</svg>
